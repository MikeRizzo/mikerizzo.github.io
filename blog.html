---
layout: page
title: Blog
---
{% assign blog_posts = site.posts | where_exp: "post", "post.category == 'blog' and post.hidden != true" %}
<section class="list">
    {% if blog_posts.size == 0 %}
        <p class="text-center">Nothing published yet!</p>
    {% else %}
        {% for post in blog_posts %}
            {% include blog-post.html %}
        {% endfor %}
    {% endif %}
</section>
